name: tokenformer_entropy
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - tqdm
  - datasets
  - jupyter
  - ipykernel
  - ipywidgets
  - wandb
  - pip
  - pip:
      - --index-url=https://download.pytorch.org/whl/cu124
      - torch==2.6.0+cu124
      - --extra-index-url=https://pypi.org/simple
      - xformers
      - safetensors>=0.4.0
      - simple-parsing>=0.1.5
      - -e .